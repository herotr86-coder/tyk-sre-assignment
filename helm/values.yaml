replicaCount: 1

image:
  repository: https://github.com/TykTechnologies/tyk-sre-assignment
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

kubeconfig: ""   # leave empty for in-cluster